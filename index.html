<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>QR de cobro</title>
<script src="qrcode.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif; max-width: 440px; margin: 0 auto; line-height: 1.5;
    padding: calc(env(safe-area-inset-top) + 1.5rem) 1rem calc(env(safe-area-inset-bottom) + 1.5rem);
  }
  h1 { font-size: 1.3rem; }
  label { display: block; font-size: .85rem; opacity: .7; margin-top: .8rem; }
  input { width: 100%; font-size: 1.1rem; padding: .55rem; box-sizing: border-box; }
  input.num { letter-spacing: 2px; }
  #msg { min-height: 1.2rem; margin: .5rem 0; font-size: .85rem; }
  .err { color: #d44; }
  #out { text-align: center; margin-top: 1.2rem; }
  #qr { display: inline-block; }
  #qr img, #qr canvas { max-width: 100%; }
  button { font-size: 1rem; padding: .55rem 1rem; cursor: pointer; }

  /* Visor */
  #visor { text-align: center; }
  .badge { display: inline-flex; align-items: center; gap: .5rem; padding: .35rem .8rem; border-radius: 999px;
           color: #fff; font-weight: 600; margin: .3rem 0 1rem; }
  .campo { text-align: left; border: 1px solid #8884; border-radius: 12px; padding: .7rem .9rem; margin: .7rem 0; }
  .campo .lab { font-size: .8rem; opacity: .7; }
  .campo .val { font-size: 1.35rem; letter-spacing: 2px; word-break: break-all; margin: .2rem 0 .5rem; }
  .campo button { width: 100%; }
</style>

<!-- Generador (dentro de la app) -->
<div id="gen">
  <h1>Genera tu QR de cobro</h1>
  <p>Llena tus datos. Quien escanee el QR verá cada dato con su botón para copiar.</p>

  <label>Nombre completo</label>
  <input name="nombre" autocomplete="off" maxlength="80" placeholder="Ej. Juan Pérez López">

  <label>CLABE (18 dígitos)</label>
  <input name="clabe" class="num" inputmode="numeric" autocomplete="off" maxlength="18" placeholder="18 dígitos">

  <label>Banco</label>
  <input name="banco" autocomplete="off" maxlength="40" placeholder="Se detecta de la CLABE">

  <label>Número de tarjeta (16 dígitos)</label>
  <input name="tarjeta" class="num" inputmode="numeric" autocomplete="off" maxlength="16" placeholder="16 dígitos (opcional)">

  <div id="msg"></div>

  <div id="out" hidden>
    <div id="qr"></div>
    <p style="opacity:.7;font-size:.85rem">Muéstralo o compártelo. Al escanear abre tus datos listos para copiar.</p>
  </div>
</div>

<!-- Visor (lo que abre al escanear) -->
<div id="visor" hidden></div>

<script>
// URL pública donde vive este mismo archivo (para el pop-up al escanear).
const VIEWER_URL = 'https://pedroenriquebardajimendoza.github.io/clabe-qr/';

// Código de banco (3 primeros dígitos de la CLABE) → [nombre, color de marca].
const BANCOS = {
  '002':['Citibanamex','#da291c'], '012':['BBVA','#1464a5'], '014':['Santander','#ec0000'],
  '019':['Banjército','#4b5320'], '021':['HSBC','#db0011'], '030':['Banco del Bajío','#e30613'],
  '036':['Inbursa','#0033a0'], '042':['Mifel','#8a1538'], '044':['Scotiabank','#ec111a'],
  '058':['Banregio','#ff6a13'], '059':['Invex','#1a3c6e'], '060':['Bansi','#e4002b'],
  '062':['Afirme','#00954c'], '072':['Banorte','#eb0029'], '103':['American Express','#016fd0'],
  '106':['Bank of America','#012169'], '108':['MUFG','#e60012'], '110':['JP Morgan','#5c2d91'],
  '112':['Bmonex','#0a2240'], '113':['Ve por Más','#003a70'], '124':['Deutsche Bank','#0018a8'],
  '127':['Banco Azteca','#007a33'], '128':['Autofin','#c8102e'], '130':['Compartamos','#f39200'],
  '132':['Multiva','#00a0df'], '133':['Actinver','#0072ce'], '135':['Nafin','#611f69'],
  '136':['Intercam','#005b9a'], '137':['BanCoppel','#ffdd00'], '138':['ABC Capital','#003057'],
  '140':['Consubanco','#e2001a'], '141':['Volkswagen Bank','#001e50'], '143':['CIBanco','#e4002b'],
  '145':['BBase','#003057'], '147':['Bankaool','#00a3e0'], '148':['PagaTodo','#00954c'],
  '150':['Banco Inmobiliario','#0a2240'], '151':['Dondé Banco','#ff5a00'], '152':['Bancrea','#003057'],
  '155':['Banco S3','#e4002b'], '156':['Sabadell','#00a0df'], '166':['Banco del Bienestar','#611232'],
  '168':['SHF','#611232'], '600':['Monex','#0a2240'], '601':['GBM','#000000'],
  '608':['Vector','#e4002b'], '616':['Finamex','#003057'], '634':['Fincomún','#00954c'],
  '638':['Nu (Nubank)','#820ad1'], '646':['STP','#00a3e0'], '648':['Evercore','#0a2240'],
  '652':['Credit Suisse','#003057'], '653':['Kuspit','#00a0df'], '670':['Banco Libertad','#e2001a'],
  '674':['AXA','#00008f'], '710':['NVIO','#00c389'], '722':['Mercado Pago','#00b1ea'],
  '723':['Cuenca','#111111'], '728':['SPIN by OXXO','#e30613'], '812':['Klar','#3b1fa4']
};
function banco(clabe){ const b = BANCOS[clabe.slice(0,3)]; return b || null; }

const $ = s => document.querySelector(s);

// --- Modo visor: datos en el # (al escanear) ---
if (location.hash.length > 1) {
  const p = decodeURIComponent(location.hash.slice(1)).split('|');
  const [nombre, clabe, tarjeta, bancoNombre, bancoColor] = p;
  const gen = $('#gen'); gen.hidden = true;
  const v = $('#visor'); v.hidden = false;

  let html = '';
  if (nombre) html += `<h1>${escapeHtml(nombre)}</h1>`;
  if (bancoNombre) {
    const dark = bancoColor === '#ffdd00';
    html += `<div class="badge" style="background:${bancoColor||'#666'};${dark?'color:#111':''}">${escapeHtml(bancoNombre)}</div>`;
  }
  if (clabe) html += campo('CLABE', clabe);
  if (tarjeta) html += campo('Tarjeta', tarjeta);
  v.innerHTML = html;
  v.querySelectorAll('button[data-copy]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await navigator.clipboard.writeText(btn.getAttribute('data-copy'));
      const t = btn.textContent; btn.textContent = '¡Copiado!';
      setTimeout(() => btn.textContent = t, 1500);
    });
  });
} else {
  iniciarGenerador();
}

function campo(lab, val) {
  return `<div class="campo"><div class="lab">${lab}</div><div class="val">${escapeHtml(val)}</div>`
       + `<button data-copy="${escapeHtml(val)}">Copiar ${lab}</button></div>`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function iniciarGenerador() {
  const nom = $('input[name=nombre]'), cl = $('input[name=clabe]'),
        bk = $('input[name=banco]'), tj = $('input[name=tarjeta]'),
        msg = $('#msg'), out = $('#out');
  let bancoManual = false;
  bk.addEventListener('input', () => { bancoManual = true; });

  // Checksum CLABE: pesos 3,7,1 sobre los primeros 17, mod 10.
  function clabeValida(c) {
    if (c.length !== 18) return false;
    const pesos = [3,7,1]; let suma = 0;
    for (let i = 0; i < 17; i++) suma += (Number(c[i]) * pesos[i % 3]) % 10;
    return (10 - (suma % 10)) % 10 === Number(c[17]);
  }
  // Luhn para tarjeta.
  function luhnValido(n) {
    let suma = 0, alt = false;
    for (let i = n.length - 1; i >= 0; i--) {
      let d = Number(n[i]); if (alt) { d *= 2; if (d > 9) d -= 9; }
      suma += d; alt = !alt;
    }
    return suma % 10 === 0;
  }

  function render() {
    cl.value = cl.value.replace(/\D/g, '');
    tj.value = tj.value.replace(/\D/g, '');
    const clabe = cl.value, tarjeta = tj.value;
    out.hidden = true; msg.textContent = ''; msg.className = '';

    // Autodetectar banco desde la CLABE (si el usuario no lo escribió a mano).
    const b = clabe.length >= 3 ? banco(clabe) : null;
    if (b && !bancoManual) bk.value = b[0];

    // Validaciones (es dinero: avisar si algo no cuadra).
    if (clabe && clabe.length === 18 && !clabeValida(clabe)) {
      msg.textContent = 'CLABE inválida (dígito de control no coincide)'; msg.className = 'err'; return;
    }
    if (clabe && clabe.length !== 18) { msg.textContent = `CLABE: ${clabe.length}/18 dígitos`; return; }
    if (tarjeta && tarjeta.length === 16 && !luhnValido(tarjeta)) {
      msg.textContent = 'Número de tarjeta inválido'; msg.className = 'err'; return;
    }
    if (tarjeta && tarjeta.length !== 16) { msg.textContent = `Tarjeta: ${tarjeta.length}/16 dígitos`; return; }
    if (!clabe && !tarjeta) return; // nada que codificar aún

    const color = b ? b[1] : '';
    const datos = [nom.value.trim(), clabe, tarjeta, bk.value.trim(), color].join('|');
    const base = location.protocol.startsWith('http') ? location.href.split('#')[0] : VIEWER_URL;
    const url = base + '#' + encodeURIComponent(datos);
    const qr = $('#qr'); qr.innerHTML = '';
    new QRCode(qr, { text: url, width: 260, height: 260, correctLevel: QRCode.CorrectLevel.M });
    out.hidden = false;
  }

  [nom, cl, bk, tj].forEach(el => el.addEventListener('input', render));
}
</script>
