<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cóbrame — tu QR de cobro</title>
<script src="qrcode.min.js"></script>
<style>
  :root {
    --bg: #f2f3f5; --card: #ffffff; --text: #101418; --muted: #667085;
    --border: #e4e7ec; --field: #f7f8fa; --accent: #12a150; --accent-press: #0e8543;
    --shadow: 0 1px 2px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.06);
    --radius: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c0f13; --card: #161b22; --text: #e8edf2; --muted: #98a2b3;
      --border: #2a313a; --field: #1e252e; --accent: #2dd4a0; --accent-press: #25b98b;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 28px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5; -webkit-font-smoothing: antialiased;
    padding: calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 32px);
  }
  .wrap { max-width: 460px; margin: 0 auto; }
  .head { text-align: center; margin-bottom: 20px; }
  .brand { font-size: 1.05rem; font-weight: 800; color: var(--accent); letter-spacing: -.01em; margin-bottom: 10px; }
  .head h1 { font-size: 1.55rem; font-weight: 700; letter-spacing: -.02em; margin: 0 0 6px; line-height: 1.2; }
  .head p { color: var(--muted); font-size: .95rem; margin: 0; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
          box-shadow: var(--shadow); padding: 18px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; font-size: 1.05rem; padding: 13px 14px; color: var(--text);
    background: var(--field); border: 1.5px solid transparent; border-radius: 12px; outline: none;
    transition: border-color .15s, background .15s;
  }
  input::placeholder { color: var(--muted); opacity: .7; }
  input:focus { border-color: var(--accent); background: var(--card); }
  input.num { letter-spacing: 2px; font-variant-numeric: tabular-nums; }

  #msg { min-height: 20px; margin: 12px 2px 0; font-size: .85rem; font-weight: 500; color: var(--muted); }
  #msg.err { color: #e5484d; }
  #msg.ok { color: var(--accent); }

  #out[hidden] { display: none; }
  #out { margin-top: 18px; text-align: center; }
  .qrbox { background: #fff; border-radius: var(--radius); padding: 18px; display: inline-block; box-shadow: var(--shadow); }
  .qrbox img, .qrbox canvas { display: block; max-width: 100%; }
  .hint { color: var(--muted); font-size: .85rem; margin: 12px 0 0; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 1rem; font-weight: 600; padding: 13px 18px; border: none; border-radius: 12px;
    background: var(--accent); color: #fff; cursor: pointer; width: 100%;
    transition: transform .08s, background .15s; -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.98); background: var(--accent-press); }
  .btn.ghost { background: transparent; color: var(--accent); border: 1.5px solid var(--border); }
  .btn svg { width: 18px; height: 18px; }
  .share-row { margin-top: 14px; display: grid; gap: 10px; }

  /* Visor */
  .beneficiario { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .mono { flex: none; display: inline-flex; align-items: center; justify-content: center;
          width: 52px; height: 52px; border-radius: 14px; font-weight: 700; font-size: 1rem; letter-spacing: .5px; }
  .beneficiario .nom { font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; line-height: 1.2; }
  .beneficiario .bnk { font-size: .85rem; color: var(--muted); }
  .row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
         box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 12px; text-align: left;
         display: flex; align-items: center; gap: 12px; }
  .row .info { min-width: 0; flex: 1; }
  .row .lab { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .row .val { font-size: 1.2rem; font-weight: 600; word-break: break-all; margin-top: 2px; }
  .row .val.num { letter-spacing: 1.5px; font-variant-numeric: tabular-nums; }
  .copy { flex: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
          background: var(--field); color: var(--accent); border: none; border-radius: 10px;
          padding: 10px 14px; font-size: .85rem; font-weight: 600; cursor: pointer;
          transition: transform .08s; -webkit-tap-highlight-color: transparent; }
  .copy:active { transform: scale(.94); }
  .copy svg { width: 16px; height: 16px; }
  .copied { color: var(--accent); }
  .loopcta { display: block; text-align: center; margin-top: 26px; padding: 16px; text-decoration: none;
             color: var(--muted); font-size: .95rem; border: 1px dashed var(--border); border-radius: var(--radius); }
  .loopcta b { color: var(--accent); }
</style>

<div class="wrap">
  <!-- Generador -->
  <div id="gen">
    <div class="head">
      <div class="brand">Cóbrame</div>
      <h1>Tu QR de cobro, listo para compartir</h1>
      <p>Deja de escribir tu CLABE cada vez. Genéralo una vez y compártelo.</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Nombre completo</label>
        <input name="nombre" autocomplete="off" maxlength="80" placeholder="Juan Pérez López">
      </div>
      <div class="field">
        <label>CLABE (18 dígitos)</label>
        <input name="clabe" class="num" inputmode="numeric" autocomplete="off" maxlength="18" placeholder="18 dígitos">
      </div>
      <div class="field">
        <label>Banco</label>
        <input name="banco" autocomplete="off" maxlength="40" placeholder="Se detecta de la CLABE">
      </div>
      <div class="field">
        <label>Tarjeta (16 dígitos · opcional)</label>
        <input name="tarjeta" class="num" inputmode="numeric" autocomplete="off" maxlength="16" placeholder="16 dígitos">
      </div>
      <div id="msg"></div>
    </div>

    <div id="out" hidden>
      <div class="qrbox"><div id="qr"></div></div>
      <p class="hint">Al escanear, tus datos se abren listos para copiar.</p>
      <div class="share-row">
        <button class="btn" id="compartir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Compartir
        </button>
      </div>
    </div>
  </div>

  <!-- Visor -->
  <div id="visor" hidden></div>
</div>

<script>
const VIEWER_URL = 'https://pedroenriquebardajimendoza.github.io/clabe-qr/';

const BANCOS = {
  '002':['Citibanamex','#da291c'], '012':['BBVA','#1464a5'], '014':['Santander','#ec0000'],
  '019':['Banjército','#4b5320'], '021':['HSBC','#db0011'], '030':['Banco del Bajío','#e30613'],
  '036':['Inbursa','#0033a0'], '042':['Mifel','#8a1538'], '044':['Scotiabank','#ec111a'],
  '058':['Banregio','#ff6a13'], '059':['Invex','#1a3c6e'], '060':['Bansi','#e4002b'],
  '062':['Afirme','#00954c'], '072':['Banorte','#eb0029'], '103':['American Express','#016fd0'],
  '106':['Bank of America','#012169'], '108':['MUFG','#e60012'], '110':['JP Morgan','#5c2d91'],
  '112':['Bmonex','#0a2240'], '113':['Ve por Más','#003a70'], '124':['Deutsche Bank','#0018a8'],
  '127':['Banco Azteca','#007a33'], '128':['Autofin','#c8102e'], '130':['Compartamos','#f39200'],
  '132':['Multiva','#00a0df'], '133':['Actinver','#0072ce'], '135':['Nafin','#611f69'],
  '136':['Intercam','#005b9a'], '137':['BanCoppel','#ffdd00'], '138':['ABC Capital','#003057'],
  '140':['Consubanco','#e2001a'], '141':['Volkswagen Bank','#001e50'], '143':['CIBanco','#e4002b'],
  '145':['BBase','#003057'], '147':['Bankaool','#00a3e0'], '148':['PagaTodo','#00954c'],
  '150':['Banco Inmobiliario','#0a2240'], '151':['Dondé Banco','#ff5a00'], '152':['Bancrea','#003057'],
  '155':['Banco S3','#e4002b'], '156':['Sabadell','#00a0df'], '166':['Banco del Bienestar','#611232'],
  '168':['SHF','#611232'], '600':['Monex','#0a2240'], '601':['GBM','#000000'],
  '608':['Vector','#e4002b'], '616':['Finamex','#003057'], '634':['Fincomún','#00954c'],
  '638':['Nu (Nubank)','#820ad1'], '646':['STP','#00a3e0'], '648':['Evercore','#0a2240'],
  '652':['Credit Suisse','#003057'], '653':['Kuspit','#00a0df'], '670':['Banco Libertad','#e2001a'],
  '674':['AXA','#00008f'], '710':['NVIO','#00c389'], '722':['Mercado Pago','#00b1ea'],
  '723':['Cuenca','#111111'], '728':['SPIN by OXXO','#e30613'], '812':['Klar','#3b1fa4']
};
function banco(clabe){ return BANCOS[clabe.slice(0,3)] || null; }

const $ = s => document.querySelector(s);
const ICON_COPY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){
  const clean = name.replace(/\(.*?\)/g,'').trim();
  const words = clean.split(/\s+/).filter(Boolean);
  if (words.length === 1){
    const caps = words[0].match(/[A-ZÁÉÍÓÚÑ0-9]/g) || [];
    return caps.length >= 2 ? caps.slice(0,4).join('') : words[0].slice(0,2).toUpperCase();
  }
  return words.slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function isLight(hex){
  const h = hex.replace('#',''); if (h.length !== 6) return false;
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) > 170;
}

// --- Modo visor: datos en el # (al escanear) ---
if (location.hash.length > 1) {
  const [nombre, clabe, tarjeta, bancoNombre, bancoColor] = decodeURIComponent(location.hash.slice(1)).split('|');
  $('#gen').hidden = true;
  const v = $('#visor'); v.hidden = false;

  let html = '';
  const color = bancoColor || '#667085';
  const txt = isLight(color) ? '#101418' : '#fff';
  const mono = bancoNombre ? initials(bancoNombre) : (nombre ? initials(nombre) : '$');
  html += `<div class="beneficiario">
    <span class="mono" style="background:${color};color:${txt}">${escapeHtml(mono)}</span>
    <div><div class="nom">${escapeHtml(nombre || 'Datos de cobro')}</div>
    ${bancoNombre ? `<div class="bnk">${escapeHtml(bancoNombre)}</div>` : ''}</div>
  </div>`;
  if (nombre)  html += row('Nombre', nombre, false);
  if (clabe)   html += row('CLABE', clabe, true);
  if (tarjeta) html += row('Tarjeta', tarjeta, true);
  const base = location.href.split('#')[0];
  html += `<a class="loopcta" href="${escapeHtml(base)}">Creado con <b>Cóbrame</b> · Crea tu QR de cobro gratis</a>`;
  v.innerHTML = html;

  v.querySelectorAll('.copy').forEach(btn => {
    btn.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(btn.getAttribute('data-copy')); } catch(e){}
      btn.innerHTML = ICON_CHECK + 'Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = ICON_COPY + 'Copiar'; btn.classList.remove('copied'); }, 1600);
    });
  });
} else {
  iniciarGenerador();
}

function row(lab, val, isNum){
  return `<div class="row">
    <div class="info"><div class="lab">${lab}</div><div class="val${isNum?' num':''}">${escapeHtml(val)}</div></div>
    <button class="copy" data-copy="${escapeHtml(val)}">${ICON_COPY}Copiar</button>
  </div>`;
}

function iniciarGenerador() {
  const nom = $('input[name=nombre]'), cl = $('input[name=clabe]'),
        bk = $('input[name=banco]'), tj = $('input[name=tarjeta]'),
        msg = $('#msg'), out = $('#out');
  let bancoManual = false, urlActual = '';
  bk.addEventListener('input', () => { bancoManual = true; });

  function clabeValida(c){
    if (c.length !== 18) return false;
    const pesos = [3,7,1]; let s = 0;
    for (let i = 0; i < 17; i++) s += (Number(c[i]) * pesos[i%3]) % 10;
    return (10 - (s%10)) % 10 === Number(c[17]);
  }
  function luhn(n){
    let s = 0, alt = false;
    for (let i = n.length-1; i >= 0; i--){ let d = Number(n[i]); if (alt){ d*=2; if (d>9) d-=9; } s+=d; alt=!alt; }
    return s % 10 === 0;
  }

  function render(){
    cl.value = cl.value.replace(/\D/g,''); tj.value = tj.value.replace(/\D/g,'');
    const clabe = cl.value, tarjeta = tj.value;
    out.hidden = true; msg.textContent = ''; msg.className = '';

    const b = clabe.length >= 3 ? banco(clabe) : null;
    if (b && !bancoManual) bk.value = b[0];

    if (clabe && clabe.length === 18 && !clabeValida(clabe)) { msg.textContent = 'CLABE inválida (no coincide el dígito de control)'; msg.className = 'err'; return; }
    if (clabe && clabe.length !== 18) { msg.textContent = `CLABE: ${clabe.length}/18 dígitos`; return; }
    if (tarjeta && tarjeta.length === 16 && !luhn(tarjeta)) { msg.textContent = 'Número de tarjeta inválido'; msg.className = 'err'; return; }
    if (tarjeta && tarjeta.length !== 16) { msg.textContent = `Tarjeta: ${tarjeta.length}/16 dígitos`; return; }
    if (!clabe && !tarjeta) return;

    msg.textContent = 'Listo ✓'; msg.className = 'ok';
    const color = b ? b[1] : '';
    const datos = [nom.value.trim(), clabe, tarjeta, bk.value.trim(), color].join('|');
    const base = location.protocol.startsWith('http') ? location.href.split('#')[0] : VIEWER_URL;
    urlActual = base + '#' + encodeURIComponent(datos);
    const qr = $('#qr'); qr.innerHTML = '';
    new QRCode(qr, { text: urlActual, width: 240, height: 240, correctLevel: QRCode.CorrectLevel.M });
    out.hidden = false;
  }

  [nom, cl, bk, tj].forEach(el => el.addEventListener('input', render));

  $('#compartir').addEventListener('click', async () => {
    if (!urlActual) return;
    const data = { title: 'Mis datos de cobro', text: 'Escanea o abre para copiar mis datos:', url: urlActual };
    try {
      if (navigator.share) { await navigator.share(data); return; }
      await navigator.clipboard.writeText(urlActual);
      const btn = $('#compartir'); const t = btn.innerHTML;
      btn.textContent = 'Link copiado ✓';
      setTimeout(() => btn.innerHTML = t, 1600);
    } catch(e){}
  });
}
</script>
